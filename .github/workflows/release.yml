name: Release
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

env:
  BIN_NAME: soffio
  BIN_CLI: soffio-cli
  MERMAID_CLI_IMAGE: minlag/mermaid-cli:latest
  RELEASE_TAG: ${{ github.ref_name }}
  RELEASE_BUILDER_IMAGE: ghcr.io/${{ github.repository }}/soffio-release-build:latest

jobs:
  prepare-release-builder:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.calc-hash.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Calculate Dockerfile Hash
        id: calc-hash
        run: |
          HASH=$(sha256sum deploy/docker/Dockerfile.build | awk '{print $1}')
          TAG="sha-${HASH}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed release builder image tag: ${TAG}"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if release builder image exists
        id: check-image
        run: |
          TAG="${{ steps.calc-hash.outputs.tag }}"
          IMAGE="ghcr.io/${{ github.repository }}/soffio-release-build:${TAG}"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "Image $IMAGE exists."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Image $IMAGE does NOT exist. Will build."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v4
        if: steps.check-image.outputs.exists == 'false'

      - name: Build & Push release builder image
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile.build
          build-args: |
            INSTALL_REDOC=false
          tags: |
            ghcr.io/${{ github.repository }}/soffio-release-build:${{ steps.calc-hash.outputs.tag }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/soffio-release-build:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/soffio-release-build:buildcache,mode=max
          push: true

  build-linux-x86_64-musl:
    name: build-linux-x86_64-musl-cpu-${{ matrix.cpu_level }}
    needs: prepare-release-builder
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cpu_level: [x86-64-v2, x86-64-v3, x86-64-v4]
    env:
      RELEASE_BUILDER_IMAGE: ghcr.io/${{ github.repository }}/soffio-release-build:${{ needs.prepare-release-builder.outputs.image_tag }}
      TARGET_TRIPLE: x86_64-unknown-linux-musl
      TARGET_LABEL: linux-x86_64-musl-cpu-${{ matrix.cpu_level }}-static
    steps:
      - uses: actions/checkout@v6
      - name: Login to GHCR (for builder image)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull release builder image
        run: docker pull "$RELEASE_BUILDER_IMAGE"
      - name: Prepare cache directories
        run: |
          mkdir -p ~/.cargo/registry ~/.cargo/git ~/.npm
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.cpu_level }}
      - name: Build (Alpine musl)
        env:
          CPU_LEVEL: ${{ matrix.cpu_level }}
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS: -C target-cpu=${{ matrix.cpu_level }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -v "$HOME/.cargo:/root/.cargo" \
            -v "$HOME/.npm:/root/.npm" \
            -e BIN_NAME="${BIN_NAME}" \
            -e BIN_CLI="${BIN_CLI}" \
            -e CPU_LEVEL="${CPU_LEVEL}" \
            -e TARGET_TRIPLE="${TARGET_TRIPLE}" \
            -e TARGET_LABEL="${TARGET_LABEL}" \
            -e CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS="${CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS}" \
            -e RELEASE_TAG="${RELEASE_TAG}" \
            -w /work \
            "$RELEASE_BUILDER_IMAGE" \
            sh -ec "$(cat <<'BUILD_SCRIPT'
          set -eux
          cargo build --release --target ${TARGET_TRIPLE} -p soffio --bin ${BIN_NAME}
          cargo build --release --target ${TARGET_TRIPLE} -p soffio-cli --bin ${BIN_CLI}
          tar_root="${BIN_NAME}-${RELEASE_TAG}-${TARGET_LABEL}"
          rm -rf dist
          mkdir -p "dist/${tar_root}"
          cp target/${TARGET_TRIPLE}/release/${BIN_NAME} "dist/${tar_root}/${BIN_NAME}"
          cp target/${TARGET_TRIPLE}/release/${BIN_CLI} "dist/${tar_root}/${BIN_CLI}"
          strip "dist/${tar_root}/${BIN_NAME}" "dist/${tar_root}/${BIN_CLI}" || true
          sh scripts/assert-static-elf.sh "dist/${tar_root}/${BIN_NAME}" "dist/${tar_root}/${BIN_CLI}"
          tar_name="${tar_root}.tar.gz"
          tar czf "${tar_name}" -C dist "${tar_root}"
          # fix permissions before cache save on host
          HOST_UID=$(stat -c '%u' /work)
          HOST_GID=$(stat -c '%g' /work)
          chown -R "$HOST_UID:$HOST_GID" /work/target /work/dist "/work/${tar_name}" /root/.cargo /root/.npm || true
          BUILD_SCRIPT
          )"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}
          path: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}.tar.gz
      - uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}.tar.gz
          overwrite_files: true
        if: startsWith(github.ref, 'refs/tags/')

  build-linux-aarch64-musl:
    name: build-linux-aarch64-musl
    needs: prepare-release-builder
    runs-on: ubuntu-latest
    env:
      RELEASE_BUILDER_IMAGE: ghcr.io/${{ github.repository }}/soffio-release-build:${{ needs.prepare-release-builder.outputs.image_tag }}
      TARGET_TRIPLE: aarch64-unknown-linux-musl
      TARGET_LABEL: linux-aarch64-musl-static
    steps:
      - uses: actions/checkout@v6
      - name: Login to GHCR (for builder image)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull release builder image
        run: docker pull "$RELEASE_BUILDER_IMAGE"
      - name: Prepare cache directories
        run: |
          mkdir -p ~/.cargo/registry ~/.cargo/git ~/.npm
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aarch64-musl
      - name: Build (aarch64 musl)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -v "$HOME/.cargo:/root/.cargo" \
            -v "$HOME/.npm:/root/.npm" \
            -e BIN_NAME="${BIN_NAME}" \
            -e BIN_CLI="${BIN_CLI}" \
            -e RELEASE_TAG="${RELEASE_TAG}" \
            -e TARGET_TRIPLE="${TARGET_TRIPLE}" \
            -e TARGET_LABEL="${TARGET_LABEL}" \
            -e CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld \
            -e CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS="-C target-feature=+crt-static -C linker-flavor=ld.lld" \
            -e CC_aarch64_unknown_linux_musl=aarch64-linux-musl-static-cc \
            -e AR_aarch64_unknown_linux_musl=ar \
            -w /work \
            "$RELEASE_BUILDER_IMAGE" \
            sh -ec "$(cat <<'BUILD_SCRIPT'
          set -eux
          cargo build --release --target ${TARGET_TRIPLE} -p soffio --bin ${BIN_NAME}
          cargo build --release --target ${TARGET_TRIPLE} -p soffio-cli --bin ${BIN_CLI}
          tar_root="${BIN_NAME}-${RELEASE_TAG}-${TARGET_LABEL}"
          rm -rf dist-aarch64
          mkdir -p "dist-aarch64/${tar_root}"
          cp target/${TARGET_TRIPLE}/release/${BIN_NAME} "dist-aarch64/${tar_root}/${BIN_NAME}"
          cp target/${TARGET_TRIPLE}/release/${BIN_CLI} "dist-aarch64/${tar_root}/${BIN_CLI}"
          strip "dist-aarch64/${tar_root}/${BIN_NAME}" "dist-aarch64/${tar_root}/${BIN_CLI}" || true
          sh scripts/assert-static-elf.sh "dist-aarch64/${tar_root}/${BIN_NAME}" "dist-aarch64/${tar_root}/${BIN_CLI}"
          tar_name="${tar_root}.tar.gz"
          tar czf "${tar_name}" -C dist-aarch64 "${tar_root}"
          # fix permissions before cache save on host
          HOST_UID=$(stat -c '%u' /work)
          HOST_GID=$(stat -c '%g' /work)
          chown -R "$HOST_UID:$HOST_GID" /work/target /work/dist-aarch64 "/work/${tar_name}" /root/.cargo /root/.npm || true
          BUILD_SCRIPT
          )"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}
          path: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}.tar.gz
      - uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}.tar.gz
          overwrite_files: true
        if: startsWith(github.ref, 'refs/tags/')

  build-freebsd-x86_64:
    name: build-freebsd-x86_64-cpu-${{ matrix.cpu_level }}
    needs: prepare-release-builder
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cpu_level: [x86-64-v2, x86-64-v3, x86-64-v4]
    env:
      RELEASE_BUILDER_IMAGE: ghcr.io/${{ github.repository }}/soffio-release-build:${{ needs.prepare-release-builder.outputs.image_tag }}
      TARGET_TRIPLE: x86_64-unknown-freebsd
      TARGET_LABEL: freebsd-x86_64-cpu-${{ matrix.cpu_level }}-static
    steps:
      - uses: actions/checkout@v6
      - name: Login to GHCR (for builder image)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull release builder image
        run: docker pull "$RELEASE_BUILDER_IMAGE"
      - name: Prepare cache directories
        run: |
          mkdir -p ~/.cargo/registry ~/.cargo/git ~/.npm
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: freebsd-${{ matrix.cpu_level }}
      - name: Build (FreeBSD)
        env:
          CARGO_TARGET_X86_64_UNKNOWN_FREEBSD_RUSTFLAGS: -C target-feature=+crt-static -C target-cpu=${{ matrix.cpu_level }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -v "$HOME/.cargo:/root/.cargo" \
            -v "$HOME/.npm:/root/.npm" \
            -e BIN_NAME="${BIN_NAME}" \
            -e BIN_CLI="${BIN_CLI}" \
            -e RELEASE_TAG="${RELEASE_TAG}" \
            -e TARGET_TRIPLE="${TARGET_TRIPLE}" \
            -e TARGET_LABEL="${TARGET_LABEL}" \
            -e CARGO_TARGET_X86_64_UNKNOWN_FREEBSD_LINKER=freebsd15-static-cc \
            -e CARGO_TARGET_X86_64_UNKNOWN_FREEBSD_RUSTFLAGS="${CARGO_TARGET_X86_64_UNKNOWN_FREEBSD_RUSTFLAGS}" \
            -e CC_x86_64_unknown_freebsd=freebsd15-static-cc \
            -w /work \
            "$RELEASE_BUILDER_IMAGE" \
            sh -ec "$(cat <<'BUILD_SCRIPT'
          set -eux
          cargo build --release --target ${TARGET_TRIPLE} -p soffio --bin ${BIN_NAME}
          cargo build --release --target ${TARGET_TRIPLE} -p soffio-cli --bin ${BIN_CLI}
          tar_root="${BIN_NAME}-${RELEASE_TAG}-${TARGET_LABEL}"
          rm -rf dist-freebsd
          mkdir -p "dist-freebsd/${tar_root}"
          cp target/${TARGET_TRIPLE}/release/${BIN_NAME} "dist-freebsd/${tar_root}/${BIN_NAME}"
          cp target/${TARGET_TRIPLE}/release/${BIN_CLI} "dist-freebsd/${tar_root}/${BIN_CLI}"
          sh scripts/assert-static-elf.sh "dist-freebsd/${tar_root}/${BIN_NAME}" "dist-freebsd/${tar_root}/${BIN_CLI}"
          tar_name="${tar_root}.tar.gz"
          tar czf "${tar_name}" -C dist-freebsd "${tar_root}"
          # fix permissions before cache save on host
          HOST_UID=$(stat -c '%u' /work)
          HOST_GID=$(stat -c '%g' /work)
          chown -R "$HOST_UID:$HOST_GID" /work/target /work/dist-freebsd "/work/${tar_name}" /root/.cargo /root/.npm || true
          BUILD_SCRIPT
          )"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}
          path: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}.tar.gz
      - uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}.tar.gz
          overwrite_files: true
        if: startsWith(github.ref, 'refs/tags/')

  build-darwin-aarch64:
    name: build-darwin-aarch64
    runs-on: macos-latest
    env:
      TARGET_TRIPLE: aarch64-apple-darwin
      TARGET_LABEL: darwin-aarch64
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - uses: actions/checkout@v6
      - name: Prepare Rust
        run: |
          set -eux
          RUST_VERSION="$(sed -n 's/^ARG RUST_IMAGE=rust:\([^-]*\)-.*/\1/p' deploy/docker/Dockerfile.build)"
          rustup toolchain install "${RUST_VERSION}" --profile minimal
          rustup default "${RUST_VERSION}"
          rustup target add "${TARGET_TRIPLE}"
      - name: Prepare TypeScript
        run: npm install --global --unsafe-perm typescript@6
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: darwin-aarch64
      - name: Build (Darwin aarch64)
        run: |
          set -eux
          export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          cargo build --release --target "${TARGET_TRIPLE}" -p soffio --bin "${BIN_NAME}"
          cargo build --release --target "${TARGET_TRIPLE}" -p soffio-cli --bin "${BIN_CLI}"
          tar_root="${BIN_NAME}-${RELEASE_TAG}-${TARGET_LABEL}"
          rm -rf dist-darwin
          mkdir -p "dist-darwin/${tar_root}"
          cp "target/${TARGET_TRIPLE}/release/${BIN_NAME}" "dist-darwin/${tar_root}/${BIN_NAME}"
          cp "target/${TARGET_TRIPLE}/release/${BIN_CLI}" "dist-darwin/${tar_root}/${BIN_CLI}"
          for binary in "dist-darwin/${tar_root}/${BIN_NAME}" "dist-darwin/${tar_root}/${BIN_CLI}"; do
            strip "${binary}" || true
            codesign --force --sign - "${binary}"
            codesign --verify --strict "${binary}"
            file "${binary}"
          done
          otool -L "dist-darwin/${tar_root}/${BIN_NAME}" "dist-darwin/${tar_root}/${BIN_CLI}"
          if otool -L "dist-darwin/${tar_root}/${BIN_NAME}" "dist-darwin/${tar_root}/${BIN_CLI}" | grep -E '/opt/homebrew|/usr/local'; then
            echo "unexpected non-system dylib dependency" >&2
            exit 1
          fi
          tar_name="${tar_root}.tar.gz"
          tar czf "${tar_name}" -C dist-darwin "${tar_root}"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}
          path: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}.tar.gz
      - uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}.tar.gz
          overwrite_files: true
        if: startsWith(github.ref, 'refs/tags/')

  docker:
    runs-on: ubuntu-latest
    needs: build-linux-x86_64-musl
    strategy:
      matrix:
        cpu_level: [x86-64-v2, x86-64-v3, x86-64-v4]
    env:
      TARGET_LABEL: linux-x86_64-musl-cpu-${{ matrix.cpu_level }}-static
    steps:
      - uses: actions/checkout@v6
      - name: Cache prebuilt dir
        uses: actions/cache@v5
        with:
          path: prebuilt/${{ matrix.cpu_level }}
          key: prebuilt-${{ env.RELEASE_TAG }}-${{ matrix.cpu_level }}
      - name: Download prebuilt binaries
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}
          path: prebuilt/${{ matrix.cpu_level }}
      - name: Extract prebuilt binaries
        run: |
          tar -xzf prebuilt/${{ matrix.cpu_level }}/${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}.tar.gz -C prebuilt/${{ matrix.cpu_level }} --strip-components=1
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push (musl)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            TARGET_TRIPLE=x86_64-unknown-linux-musl
            TARGET_CPU=${{ matrix.cpu_level }}
            MERMAID_CLI_IMAGE=${{ env.MERMAID_CLI_IMAGE }}
            PREBUILT_DIR=prebuilt/${{ matrix.cpu_level }}
          cache-from: type=gha,scope=${{ github.ref_name }}-${{ matrix.cpu_level }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-${{ matrix.cpu_level }}
          tags: |
            ghcr.io/${{ github.repository }}:amd64-${{ matrix.cpu_level }}
            ghcr.io/${{ github.repository }}:${{ env.RELEASE_TAG }}-amd64-${{ matrix.cpu_level }}

  publish-release-builder:
    needs: [prepare-release-builder, build-linux-x86_64-musl, build-linux-aarch64-musl, build-freebsd-x86_64, build-darwin-aarch64]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Publish release builder tags
        run: |
          TAG="${{ needs.prepare-release-builder.outputs.image_tag }}"
          REPO="ghcr.io/${{ github.repository }}/soffio-release-build"
          docker buildx imagetools create \
            -t "${REPO}:latest" \
            -t "${REPO}:${{ github.sha }}" \
            "${REPO}:${TAG}"
