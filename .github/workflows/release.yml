name: Release
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

env:
  BIN_NAME: soffio
  BIN_CLI: soffio-cli
  MERMAID_CLI_IMAGE: minlag/mermaid-cli:latest
  RELEASE_TAG: ${{ github.ref_name }}
  RELEASE_BUILDER_IMAGE: ghcr.io/${{ github.repository }}/soffio-release-build:latest

jobs:
  prepare-release-builder:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.calc-hash.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Calculate Dockerfile Hash
        id: calc-hash
        run: |
          HASH=$(sha256sum deploy/docker/Dockerfile.build | awk '{print $1}')
          TAG="sha-${HASH}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed release builder image tag: ${TAG}"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if release builder image exists
        id: check-image
        run: |
          TAG="${{ steps.calc-hash.outputs.tag }}"
          IMAGE="ghcr.io/${{ github.repository }}/soffio-release-build:${TAG}"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "Image $IMAGE exists."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Image $IMAGE does NOT exist. Will build."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v4
        if: steps.check-image.outputs.exists == 'false'

      - name: Build & Push release builder image
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile.build
          build-args: |
            INSTALL_REDOC=false
          tags: |
            ghcr.io/${{ github.repository }}/soffio-release-build:${{ steps.calc-hash.outputs.tag }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/soffio-release-build:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/soffio-release-build:buildcache,mode=max
          push: true

  build-binaries:
    needs: prepare-release-builder
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cpu_level: [x86-64-v2, x86-64-v3, x86-64-v4]
    env:
      RELEASE_BUILDER_IMAGE: ghcr.io/${{ github.repository }}/soffio-release-build:${{ needs.prepare-release-builder.outputs.image_tag }}
      TARGET_TRIPLE: x86_64-unknown-linux-musl
      TARGET_LABEL: linux-x86_64-musl-cpu-${{ matrix.cpu_level }}-static
    steps:
      - uses: actions/checkout@v6
      - name: Login to GHCR (for builder image)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull release builder image
        run: docker pull "$RELEASE_BUILDER_IMAGE"
      - name: Prepare cache directories
        run: |
          mkdir -p ~/.cargo/registry ~/.cargo/git ~/.npm
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.cpu_level }}
      - name: Build (Alpine musl)
        env:
          CPU_LEVEL: ${{ matrix.cpu_level }}
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS: -C target-cpu=${{ matrix.cpu_level }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -v "$HOME/.cargo:/root/.cargo" \
            -v "$HOME/.npm:/root/.npm" \
            -e BIN_NAME="${BIN_NAME}" \
            -e BIN_CLI="${BIN_CLI}" \
            -e CPU_LEVEL="${CPU_LEVEL}" \
            -e TARGET_TRIPLE="${TARGET_TRIPLE}" \
            -e TARGET_LABEL="${TARGET_LABEL}" \
            -e CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS="${CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS}" \
            -e RELEASE_TAG="${RELEASE_TAG}" \
            -w /work \
            "$RELEASE_BUILDER_IMAGE" \
            sh -ec '
              set -eux
              cargo build --release --target ${TARGET_TRIPLE} -p soffio --bin ${BIN_NAME} && \
              cargo build --release --target ${TARGET_TRIPLE} -p soffio-cli --bin ${BIN_CLI} && \
              tar_root="${BIN_NAME}-${RELEASE_TAG}-${TARGET_LABEL}" && \
              rm -rf dist && mkdir -p "dist/${tar_root}" && \
              cp target/${TARGET_TRIPLE}/release/${BIN_NAME} "dist/${tar_root}/${BIN_NAME}" && \
              cp target/${TARGET_TRIPLE}/release/${BIN_CLI} "dist/${tar_root}/${BIN_CLI}" && \
              strip "dist/${tar_root}/${BIN_NAME}" "dist/${tar_root}/${BIN_CLI}" || true && \
              sh scripts/assert-static-elf.sh "dist/${tar_root}/${BIN_NAME}" "dist/${tar_root}/${BIN_CLI}" && \
              tar_name="${tar_root}.tar.gz" && \
              tar czf "${tar_name}" -C dist "${tar_root}" && \
              # fix permissions before cache save on host
              HOST_UID=$(stat -c '%u' /work) && HOST_GID=$(stat -c '%g' /work) && \
              chown -R "$HOST_UID:$HOST_GID" /work/target /root/.cargo /root/.npm || true
            '
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}
          path: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}.tar.gz
      - uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}.tar.gz
        if: startsWith(github.ref, 'refs/tags/')

  build-freebsd:
    needs: prepare-release-builder
    runs-on: ubuntu-latest
    env:
      RELEASE_BUILDER_IMAGE: ghcr.io/${{ github.repository }}/soffio-release-build:${{ needs.prepare-release-builder.outputs.image_tag }}
      TARGET_TRIPLE: x86_64-unknown-freebsd
      TARGET_LABEL: freebsd-x86_64-freebsd15-static
    steps:
      - uses: actions/checkout@v6
      - name: Login to GHCR (for builder image)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull release builder image
        run: docker pull "$RELEASE_BUILDER_IMAGE"
      - name: Prepare cache directories
        run: |
          mkdir -p ~/.cargo/registry ~/.cargo/git ~/.npm
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: freebsd15
      - name: Build (FreeBSD 15)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -v "$HOME/.cargo:/root/.cargo" \
            -v "$HOME/.npm:/root/.npm" \
            -e BIN_NAME="${BIN_NAME}" \
            -e BIN_CLI="${BIN_CLI}" \
            -e RELEASE_TAG="${RELEASE_TAG}" \
            -e TARGET_TRIPLE="${TARGET_TRIPLE}" \
            -e TARGET_LABEL="${TARGET_LABEL}" \
            -e CARGO_TARGET_X86_64_UNKNOWN_FREEBSD_LINKER=freebsd15-static-cc \
            -e CARGO_TARGET_X86_64_UNKNOWN_FREEBSD_RUSTFLAGS="-C target-feature=+crt-static" \
            -e CC_x86_64_unknown_freebsd=freebsd15-static-cc \
            -w /work \
            "$RELEASE_BUILDER_IMAGE" \
            sh -ec '
              set -eux
              cargo build --release --target ${TARGET_TRIPLE} -p soffio --bin ${BIN_NAME} && \
              cargo build --release --target ${TARGET_TRIPLE} -p soffio-cli --bin ${BIN_CLI} && \
              tar_root="${BIN_NAME}-${RELEASE_TAG}-${TARGET_LABEL}" && \
              rm -rf dist-freebsd && mkdir -p "dist-freebsd/${tar_root}" && \
              cp target/${TARGET_TRIPLE}/release/${BIN_NAME} "dist-freebsd/${tar_root}/${BIN_NAME}" && \
              cp target/${TARGET_TRIPLE}/release/${BIN_CLI} "dist-freebsd/${tar_root}/${BIN_CLI}" && \
              sh scripts/assert-static-elf.sh "dist-freebsd/${tar_root}/${BIN_NAME}" "dist-freebsd/${tar_root}/${BIN_CLI}" && \
              tar_name="${tar_root}.tar.gz" && \
              tar czf "${tar_name}" -C dist-freebsd "${tar_root}" && \
              # fix permissions before cache save on host
              HOST_UID=$(stat -c '%u' /work) && HOST_GID=$(stat -c '%g' /work) && \
              chown -R "$HOST_UID:$HOST_GID" /work/target /root/.cargo /root/.npm || true
            '
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}
          path: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}.tar.gz
      - uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}.tar.gz
        if: startsWith(github.ref, 'refs/tags/')

  docker:
    runs-on: ubuntu-latest
    needs: build-binaries
    strategy:
      matrix:
        cpu_level: [x86-64-v2, x86-64-v3, x86-64-v4]
    env:
      TARGET_LABEL: linux-x86_64-musl-cpu-${{ matrix.cpu_level }}-static
    steps:
      - uses: actions/checkout@v6
      - name: Cache prebuilt dir
        uses: actions/cache@v5
        with:
          path: prebuilt/${{ matrix.cpu_level }}
          key: prebuilt-${{ env.RELEASE_TAG }}-${{ matrix.cpu_level }}
      - name: Download prebuilt binaries
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}
          path: prebuilt/${{ matrix.cpu_level }}
      - name: Extract prebuilt binaries
        run: |
          tar -xzf prebuilt/${{ matrix.cpu_level }}/${{ env.BIN_NAME }}-${{ env.RELEASE_TAG }}-${{ env.TARGET_LABEL }}.tar.gz -C prebuilt/${{ matrix.cpu_level }} --strip-components=1
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push (musl)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            TARGET_TRIPLE=x86_64-unknown-linux-musl
            TARGET_CPU=${{ matrix.cpu_level }}
            MERMAID_CLI_IMAGE=${{ env.MERMAID_CLI_IMAGE }}
            PREBUILT_DIR=prebuilt/${{ matrix.cpu_level }}
          cache-from: type=gha,scope=${{ github.ref_name }}-${{ matrix.cpu_level }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-${{ matrix.cpu_level }}
          tags: |
            ghcr.io/${{ github.repository }}:amd64-${{ matrix.cpu_level }}
            ghcr.io/${{ github.repository }}:${{ env.RELEASE_TAG }}-amd64-${{ matrix.cpu_level }}

  publish-release-builder:
    needs: [prepare-release-builder, build-binaries, build-freebsd]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Publish release builder tags
        run: |
          TAG="${{ needs.prepare-release-builder.outputs.image_tag }}"
          REPO="ghcr.io/${{ github.repository }}/soffio-release-build"
          docker buildx imagetools create \
            -t "${REPO}:latest" \
            -t "${REPO}:${{ github.sha }}" \
            "${REPO}:${TAG}"
